body{

.hero{

linear-gradient(rgba(0,0,0,.70),rgba(0,0,0,.82)),

.hero-content{

.buttons{

.btn{

padding:18px;

font-weight:600;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

color:white;

border:1px solid rgba(255,255,255,.15);

transition:.3s;

}

.btn:hover{

transform:translateY(-4px);

background:#d5b06a;

color:black;

}

.booking{

display:inline-block;

background:#d5b06a;

color:black;

padding:18px 38px;

border-radius:40px;

font-weight:bold;

text-decoration:none;

font-size:18px;

transition:.3s;

}

.booking:hover{

transform:scale(1.05);

}

@media(max-width:700px){

.signature{

font-size:58px;

}

.tagline{

font-size:25px;

}
